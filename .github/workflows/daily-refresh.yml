name: Daily TDF Data Refresh & Predictions

# Runs daily at 08:00 UTC during the Tour de France (July 4-26, 2026) to fetch
# the latest results from Wikipedia, retrain the models and regenerate
# predictions, then deploy the rebuilt dashboard.

on:
  schedule:
    # Daily at 08:00 UTC during TDF 2026 (and a few days after Paris)
    - cron: "0 8 4-28 7 *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force refresh even outside TDF dates"
        type: boolean
        default: false

concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if TDF is active (July 4-28)
        id: check-tdf
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          TDF_START="2026-07-04"
          TDF_END="2026-07-28"

          if [ "$TODAY" \< "$TDF_START" ] || [ "$TODAY" \> "$TDF_END" ]; then
            if [ "${{ github.event.inputs.force }}" != "true" ]; then
              echo "TDF 2026 is not active (current: $TODAY, TDF: $TDF_START to $TDF_END)"
              echo "should_skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "should_skip=false" >> $GITHUB_OUTPUT

      - name: Fetch latest data (live 2026 + historical)
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          python scripts/fetch_tdf_data.py --all --output data

          if [ ! -f "data/live/gc_standings.parquet" ]; then
            echo "Error: Failed to fetch 2026 data"
            exit 1
          fi
          echo "✓ Data fetched successfully"

      - name: Retrain models & generate predictions
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          python scripts/train_predictions.py --train --predict

          if [ ! -f "data/predictions/stage_predictions.parquet" ]; then
            echo "Error: Failed to generate predictions"
            exit 1
          fi
          echo "✓ Predictions generated successfully"

      - name: Commit and push data updates
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: daily refresh $(date -u +%F)"
            git push origin main
            echo "✓ Data updates committed and pushed"
          fi

  build-deploy:
    needs: refresh-data
    if: needs.refresh-data.result == 'success'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

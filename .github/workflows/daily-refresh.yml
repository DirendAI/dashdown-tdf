name: Daily TDF Data Refresh & Predictions

# This workflow runs daily at 08:00 UTC during the Tour de France (July 5-27, 2026)
# to fetch the latest data and regenerate predictions

on:
  schedule:
    # Run daily at 08:00 UTC during TDF 2026
    - cron: "0 8 5-27 7 *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force refresh even outside TDF dates"
        type: boolean
        default: false

concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r scripts/requirements.txt

      - name: Check if TDF is active (July 5-27)
        id: check-tdf
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          TDF_START="2026-07-05"
          TDF_END="2026-07-27"
          
          if [ "$TODAY" \< "$TDF_START" ] || [ "$TODAY" \> "$TDF_END" ]; then
            if [ "${{ github.event.inputs.force }}" != "true" ]; then
              echo "TDF 2026 is not active (current: $TODAY, TDF: $TDF_START to $TDF_END)"
              echo "Skipping refresh unless forced"
              echo "should_skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "should_skip=false" >> $GITHUB_OUTPUT

      - name: Fetch latest TDF 2026 data
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          echo "Fetching latest 2026 data..."
          python scripts/fetch_tdf_data.py --year 2026 --output data
          
          # Verify data was fetched
          if [ ! -f "data/live/gc_standings.parquet" ]; then
            echo "Error: Failed to fetch 2026 data"
            exit 1
          fi
          
          echo "✓ 2026 data fetched successfully"

      - name: Generate ML predictions
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          echo "Generating predictions..."
          python scripts/train_predictions.py --predict-all --data-dir data --output data/predictions
          
          # Verify predictions were generated
          if [ ! -f "data/predictions/all_stage_predictions.parquet" ]; then
            echo "Error: Failed to generate predictions"
            exit 1
          fi
          
          echo "✓ Predictions generated successfully"

      - name: Update data freshness metadata
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          # Create/Update metadata file
          cat > data/metadata.json << 'EOF'
          {
            "last_refreshed": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "data_sources": ["ProCyclingStats", "Cycling Archives"],
            "refresh_interval": "daily",
            "next_refresh": "$(date -u -d 'tomorrow 08:00 UTC' +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          
          echo "✓ Metadata updated"

      - name: Commit and push data updates
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "No data changes to commit"
          else
            git add data/
            git commit -m "data: daily refresh $(date -u +%F)"
            git push origin main
            echo "✓ Data updates committed and pushed"
          fi

  build-deploy:
    needs: refresh-data
    if: always() && needs.refresh-data.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Dashdown with Mistral support
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Build static dashboard
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          echo "Building dashboard with AI commentary..."
          dashdown build . --out dist
          
          # Verify build succeeded
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "Error: Build failed or produced empty output"
            exit 1
          fi
          
          echo "✓ Dashboard built successfully"

      - name: Gate - Verify Ask/Explain answers baked
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python - <<'EOF'
          import glob, json, os, sys
          files = glob.glob("dist/_dashdown/data/_ask/*.json")
          if not files:
              print("Warning: no baked ask payloads found")
              sys.exit(0)  # Don't fail if no Ask components
          notices = [f for f in files
                     if json.load(open(f)).get("notice") or not json.load(open(f)).get("html")]
          if os.environ.get("MISTRAL_API_KEY"):
              if notices:
                  print(f"Error: {len(notices)}/{len(files)} asks baked a notice instead of an answer")
                  sys.exit(1)
              print(f"✓ {len(files)} asks baked with real answers")
          else:
              print(f"MISTRAL_API_KEY not set — {len(notices)} notice payloads")
          EOF

      - name: Gate - Verify charts draw
        run: |
          dashdown screenshot / --dist dist --full-page -o page.png
          if [ ! -f "page.png" ]; then
            echo "Error: Screenshot failed - charts may not be drawing"
            exit 1
          fi
          echo "✓ Charts verified"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
        with:
          publish_dir: dist

      - name: Output deployment URL
        run: |
          echo "Dashboard deployed to: ${{ steps.deployment.outputs.page_url }}"
          echo "DEPLOY_URL=${{ steps.deployment.outputs.page_url }}" >> $GITHUB_ENV

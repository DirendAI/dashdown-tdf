name: Daily TDF Data Refresh & Predictions

# Fetches the latest results from Wikipedia, retrains the models, regenerates
# predictions and deploys the rebuilt dashboard. Runs each morning AND three
# times in the evening during the Tour: stages finish ~15:00-17:30 UTC and
# Wikipedia is updated within an hour or two, so the evening passes pick up
# the day's result the same day instead of leaving the dashboard a stage
# behind until the next morning. A pass with no data changes commits nothing.

on:
  schedule:
    # 08:00 morning baseline + evening passes, during TDF 2026 (and a few
    # days after Paris)
    - cron: "0 8,16,18,20 4-28 7 *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force refresh even outside TDF dates"
        type: boolean
        default: false

concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      data_changed: ${{ steps.commit.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if TDF is active (July 4-28)
        id: check-tdf
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          TDF_START="2026-07-04"
          TDF_END="2026-07-28"

          if [ "$TODAY" \< "$TDF_START" ] || [ "$TODAY" \> "$TDF_END" ]; then
            if [ "${{ github.event.inputs.force }}" != "true" ]; then
              echo "TDF 2026 is not active (current: $TODAY, TDF: $TDF_START to $TDF_END)"
              echo "should_skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "should_skip=false" >> $GITHUB_OUTPUT

      - name: Fetch latest data (live 2026 + historical)
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          python scripts/fetch_tdf_data.py --all --output data

          if [ ! -f "data/live/gc_standings.parquet" ]; then
            echo "Error: Failed to fetch 2026 data"
            exit 1
          fi
          echo "✓ Data fetched successfully"

      - name: Retrain models & generate predictions
        if: steps.check-tdf.outputs.should_skip != 'true'
        run: |
          python scripts/train_predictions.py --train --predict

          if [ ! -f "data/predictions/stage_predictions.parquet" ]; then
            echo "Error: Failed to generate predictions"
            exit 1
          fi
          echo "✓ Predictions generated successfully"

      - name: Commit and push data updates
        if: steps.check-tdf.outputs.should_skip != 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: refresh $(date -u +'%F %H:%M UTC')"
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✓ Data updates committed and pushed"
          fi

  # Deploy only when the refresh actually changed data — the evening passes
  # before a stage result lands on Wikipedia are no-ops. Code changes deploy
  # via deploy.yml's own push trigger.
  build-deploy:
    needs: refresh-data
    if: needs.refresh-data.result == 'success' && needs.refresh-data.outputs.data_changed == 'true'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    permissions:
      contents: read
